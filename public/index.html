<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agreeable — Terms Decoder</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col font-sans">

  <header class="border-b border-zinc-800 p-4 bg-zinc-900/50 backdrop-blur">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold tracking-tight text-emerald-400">⚖️ Agreeable</h1>
      <span class="text-xs px-2 py-1 bg-zinc-800 text-zinc-400 rounded border border-zinc-700">BTL Runtime Engine</span>
    </div>
  </header>

  <main class="flex-1 max-w-7xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
    
    <div class="flex flex-col gap-3">
      <label class="text-sm font-medium text-zinc-400">Paste Contract or Terms of Service Context Here</label>
      <textarea id="contractInput" class="w-full flex-1 min-h-[300px] md:min-h-0 bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-zinc-300 focus:outline-none focus:border-emerald-500 font-mono text-sm resize-none" placeholder="Paste legal jargon, privacy agreements, or rental terms here..."></textarea>
      <button id="analyzeBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 shadow-lg shadow-emerald-900/20">
        Decode Document Context
      </button>
    </div>

    <div class="flex flex-col gap-4">
      
      <div id="resultsWrapper" class="hidden flex flex-col gap-4">
        <div class="bg-zinc-900/60 border border-zinc-800 rounded-xl p-4">
          <h3 class="text-zinc-400 text-sm font-semibold mb-2">📋 Executive Summary</h3>
          <p id="summaryText" class="text-zinc-300 text-sm leading-relaxed"></p>
        </div>

        <div class="grid grid-cols-1 gap-3">
          <div class="bg-red-950/30 border border-red-900/40 rounded-xl p-4">
            <h3 class="text-red-400 text-sm font-semibold mb-2 flex items-center gap-2">⚠️ Dangerous "Gotchas"</h3>
            <ul id="gotchasList" class="list-disc pl-5 text-zinc-300 text-sm space-y-1.5"></ul>
          </div>
          <div class="bg-emerald-950/20 border border-emerald-900/40 rounded-xl p-4">
            <h3 class="text-emerald-400 text-sm font-semibold mb-2 flex items-center gap-2">✅ Good to Know</h3>
            <ul id="goodToList" class="list-disc pl-5 text-zinc-300 text-sm space-y-1.5"></ul>
          </div>
        </div>
      </div>

      <div class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl flex flex-col overflow-hidden min-h-[300px]">
        <div class="bg-zinc-800/40 border-b border-zinc-800 px-4 py-2 text-xs font-semibold tracking-wider text-zinc-400 uppercase">
          Document Interrogator Chat
        </div>
        <div id="chatMessages" class="flex-1 p-4 overflow-y-auto space-y-3 text-sm">
          <div class="text-zinc-500 italic">Analyze a document first to activate context-aware follow-up queries.</div>
        </div>
        <div class="p-3 bg-zinc-950 border-t border-zinc-800 flex gap-2">
          <input id="chatInput" type="text" class="flex-1 bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-zinc-200 text-sm focus:outline-none focus:border-emerald-500" placeholder="Ask about specific clauses..." disabled />
          <button id="sendChatBtn" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-lg font-medium text-sm transition" disabled>Ask</button>
        </div>
      </div>

    </div>
  </main>

  <script>
    let currentContractText = '';
    let chatHistory = [];

    const analyzeBtn = document.getElementById('analyzeBtn');
    const contractInput = document.getElementById('contractInput');
    const chatInput = document.getElementById('chatInput');
    const sendChatBtn = document.getElementById('sendChatBtn');
    const chatMessages = document.getElementById('chatMessages');

    analyzeBtn.addEventListener('click', async () => {
      const text = contractInput.value.trim();
      if (!text) return alert("Please paste text context first.");
      
      currentContractText = text;
      analyzeBtn.innerText = "Processing State Context...";
      analyzeBtn.disabled = true;

      try {
        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contractText: text })
        });
        const data = await response.json();

        document.getElementById('summaryText').innerText = data.summary;
        
        const gotchasList = document.getElementById('gotchasList');
        gotchasList.innerHTML = data.gotchas.map(g => `<li>${g}</li>`).join('');
        
        const goodToList = document.getElementById('goodToList');
        goodToList.innerHTML = data.goodToKnow.map(g => `<li>${g}</li>`).join('');

        document.getElementById('resultsWrapper').classList.remove('hidden');
        chatMessages.innerHTML = `<div class="text-emerald-400 font-medium">✨ System primed. Ask me anything about this contract context rules.</div>`;
        chatInput.disabled = false;
        sendChatBtn.disabled = false;
      } catch (err) {
        alert("Parsing failed. Double check backend server tracking logs.");
      } finally {
        analyzeBtn.innerText = "Decode Document Context";
        analyzeBtn.disabled = false;
      }
    });

    sendChatBtn.addEventListener('click', async () => {
      const question = chatInput.value.trim();
      if (!question) return;

      chatMessages.innerHTML += `<div class="text-right text-zinc-400 font-semibold">You: <span class="font-normal text-zinc-100">${question}</span></div>`;
      chatInput.value = '';

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contractText: currentContractText,
            userQuestion: question,
            chatHistory: chatHistory
          })
        });
        const data = await response.json();

        chatMessages.innerHTML += `<div class="text-emerald-400 font-semibold">Companion: <span class="font-normal text-zinc-300">${data.answer}</span></div>`;
        chatHistory.push({ role: 'user', content: question });
        chatHistory.push({ role: 'assistant', content: data.answer });
        chatMessages.scrollTop = chatMessages.scrollHeight;
      } catch (err) {
        chatMessages.innerHTML += `<div class="text-red-400 italic">Error getting response.</div>`;
      }
    });
  </script>
</body>
</html>
